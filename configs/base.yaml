seeds:
  dataset_name: pyrit_example_dataset
  num_samples: 2

attack:
  type: crescendo
  max_turns: 4
  max_backtracks: 2
  scoring_threshold: 0.8

  adversarial:
    model_name: meta-llama/llama-3.1-8b-instruct
    temperature: 1.0
    top_p: 1.0
    max_completion_tokens: 1024

  scoring:
    model_name: openai/gpt-oss-120b
    temperature: 0.1
    top_p: 1.0
    max_completion_tokens: 1024

  objective:
    model_name: meta-llama/llama-3.1-8b-instruct
    temperature: 1.0
    top_p: 1.0
    max_completion_tokens: 1024

encoders:
  lexical:
    max_features: 4096
    stop_words: english
    min_df: 1
    max_df: 0.95

  semantic:
    model_name: qwen/qwen3-embedding-8b
    max_context_tokens: 32000
    batch_size: 128
